<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
</head>
<body>
<h1>Admin Page</h1>
<p id="user-info">Checking access...</p>
<a href="/logout">Logout</a>

<script src="/js/fetch-wrapper.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const user = await apiFetch('/api/v1/auth/admin/me');
            document.getElementById('user-info').innerText = 'Admin logged in: ' + user;
        } catch (error) {
            console.error('Access denied');
        }
    });
</script>
</body>
</html>
